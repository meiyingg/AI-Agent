# Render Blueprint: one-shot backend deploy.
# Render dashboard → New → Blueprint → pick this repo → fill the two keys when prompted.
services:
  - type: web
    name: chamber-advisor-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false      # prompted in the dashboard, never stored in the repo
      - key: TAVILY_API_KEY
        sync: false
      - key: APP_USER
        value: admin     # login username (not secret)
      - key: APP_PASSWORD
        sync: false      # login password — set in the dashboard; gate is OFF if blank
      # ---- 永久存储 (设了才走云端持久化) ----
      - key: DATABASE_URL          # Neon Postgres 连接串
        sync: false
      - key: R2_ENDPOINT_URL       # Cloudflare R2
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false

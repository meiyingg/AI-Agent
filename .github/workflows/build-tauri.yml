# 在 GitHub 云端构建 Tauri 桌面/移动包，本地无需安装 Rust / Android SDK。
#
# 触发方式：
#   1) 手动：仓库 Actions 页 → "Build Tauri (Windows + Android)" → Run workflow
#   2) 打 tag：git tag v0.1.0 && git push --tags
#
# 产物：在每次运行的 Artifacts 里下载
#   - windows-installer：.exe (NSIS 安装包)
#   - android-apk      ：debug 签名的 .apk（可直接装到手机，需开"未知来源")
#
# 重要：手机/桌面 App 连的是云端后端。请在仓库
#   Settings → Secrets and variables → Actions → Variables 新增
#   NEXT_PUBLIC_API_BASE = https://你的后端域名
# 不设则回退 http://127.0.0.1:8000（手机连不上，仅本机能用）。

name: Build Tauri (Windows + Android)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-tauri-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # 前端打包时注入的后端地址（仓库 Variables 里配置；未配置则为空，api.ts 回退本地）。
  NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}

jobs:
  # ============================ Windows 桌面 ============================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify backend API base is set
        shell: bash
        run: |
          if [ -z "${NEXT_PUBLIC_API_BASE:-}" ]; then
            echo "::error::NEXT_PUBLIC_API_BASE 为空。到 仓库 Settings → Secrets and variables → Actions → 【Variables】标签(不是 Secrets)添加 NEXT_PUBLIC_API_BASE=https://你的后端域名；否则打出的 App 会请求 127.0.0.1，登录必然失败。"
            exit 1
          fi
          echo "✓ NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target

      - name: Install frontend deps
        working-directory: web
        # 未提交锁文件里的 @tauri-apps/cli，故放开 frozen-lockfile。
        run: pnpm install --no-frozen-lockfile

      - name: Generate icons
        working-directory: web
        run: pnpm tauri icon app-icon.png

      - name: Build Tauri (Windows installer)
        working-directory: web
        # 只出 NSIS 安装包(.exe)；MSI/WiX 在 CI 上更易抽风,需要时再加 --bundles nsis,msi。
        run: pnpm tauri build --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          if-no-files-found: error
          path: web/src-tauri/target/release/bundle/nsis/*.exe

  # ============================ Android APK ============================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify backend API base is set
        shell: bash
        run: |
          if [ -z "${NEXT_PUBLIC_API_BASE:-}" ]; then
            echo "::error::NEXT_PUBLIC_API_BASE 为空。到 仓库 Settings → Secrets and variables → Actions → 【Variables】标签(不是 Secrets)添加 NEXT_PUBLIC_API_BASE=https://你的后端域名；否则打出的 App 会请求 127.0.0.1，登录必然失败。"
            exit 1
          fi
          echo "✓ NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Point NDK_HOME at preinstalled NDK
        # ubuntu runner 预装了 NDK；Tauri 通过 NDK_HOME 找它。
        run: echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: Setup Rust (+ Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target

      - name: Install frontend deps
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Generate icons
        working-directory: web
        run: pnpm tauri icon app-icon.png

      - name: Init Android project
        working-directory: web
        run: pnpm tauri android init

      - name: Build Android APK (debug-signed, installable, arm64 only)
        working-directory: web
        # 只编 arm64-v8a(覆盖绝大多数现代手机)；配合 Cargo profile.dev 的 strip，
        # APK 从 ~250MB(universal + 调试符号) 降到 ~20MB 量级。
        # 若以后要支持 32 位老机/x86 模拟器，再追加 ,armv7-linux-androideabi,x86_64-linux-android。
        run: pnpm tauri android build --apk --debug --target aarch64-linux-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          if-no-files-found: error
          path: web/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
